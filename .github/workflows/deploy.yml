name: WebGL Engine Compiler
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Native JavaScript WebGL Synthesis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Web Environment Setup
        run: |
          mkdir -p build/WebGL
          cat << 'EOF' > build/WebGL/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>Project Figurine: Phase 1 Alpha</title>
              <style>
                  * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
                  body { margin: 0; background: #020208; color: #00ffcc; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
                  #gameContainer { width: 100vw; height: 100vh; max-width: 450px; max-height: 850px; position: relative; border: 2px solid #00ffcc; box-shadow: 0 0 25px #00ffcc; aspect-ratio: 9/16; background: #05050f; }
                  canvas { width: 100%; height: 100%; display: block; }
                  .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5, 5, 15, 0.95); transition: opacity 0.4s ease; z-index: 10; }
                  .hidden { opacity: 0; pointer-events: none; }
                  h1 { font-size: 28px; text-shadow: 0 0 10px #00ffcc; margin-bottom: 5px; text-align: center; }
                  .subtitle { color: #ff007f; text-shadow: 0 0 5px #ff007f; margin-bottom: 40px; font-size: 14px; }
                  .btn { padding: 16px 32px; background: none; border: 2px solid #00ffcc; color: #00ffcc; font-family: monospace; font-size: 18px; cursor: pointer; text-shadow: 0 0 5px #00ffcc; box-shadow: 0 0 10px #00ffcc; transition: 0.2s; margin: 10px 0; width: 220px; text-align: center; }
                  .btn:hover { background: #00ffcc; color: #000; }
                  .btn.secondary { border-color: #ff007f; color: #ff007f; text-shadow: 0 0 5px #ff007f; box-shadow: 0 0 10px #ff007f; }
                  .btn.secondary:hover { background: #ff007f; color: #000; }
              </style>
          </head>
          <body>

          <div id="gameContainer">
              <div id="mainMenu" class="screen">
                  <h1>FIGURINE IDLE</h1>
                  <div class="subtitle">FOUNDATION ALPHA V1 // CORE NODE</div>
                  <button class="btn" onclick="startGame()">START RUN</button>
                  <button class="btn secondary" onclick="alert('Lab Locked: Requires Phase 5 PlayerPrefs Core Meta-Telemetry Storage.')">UPGRADE LAB</button>
              </div>

              <div id="gameOverScreen" class="screen hidden">
                  <h1 style="color: #ff0055; text-shadow: 0 0 15px #ff0055;">RUN CONCLUDED</h1>
                  <div id="finalScore" class="subtitle" style="margin-bottom: 30px;">WAVES CLEARED: 0</div>
                  <button class="btn" onclick="resetToMenu()">RETURN TO BASE</button>
              </div>

              <canvas id="gameCanvas"></canvas>
          </div>

          <script>
              const canvas = document.getElementById('gameCanvas');
              const ctx = canvas.getContext('2d');
              
              let gameState = 'MENU';
              let score = 0;
              let kills = 0;
              let wave = 1;
              let waveActive = false;
              let distanceTraveled = 0;

              // Telemetry System Metrics (Matching requested baseline spec rules)
              const player = {
                  x: 0, y: 0,
                  radius: 14,
                  maxHealth: 100,
                  currentHealth: 100,
                  speed: 4.5, // Operational balanced transform translate scalar
                  damage: 25,
                  angle: 0
              };

              let enemies = [];
              let projectiles = [];
              let particles = [];
              let lastShotTime = 0;
              const fireRate = 350; // Milliseconds between automated fire vectors

              // Virtual Joystick Data Track Nodes
              const joystick = {
                  startX: 0, startY: 0,
                  currentX: 0, currentY: 0,
                  active: false,
                  alpha: 0,
                  lastInputTime: 0,
                  maxRadius: 45
              };

              function resizeCanvas() {
                  canvas.width = canvas.offsetWidth;
                  canvas.height = canvas.offsetHeight;
                  if (gameState === 'MENU') {
                      player.x = canvas.width / 2;
                      player.y = canvas.height * 0.7;
                  }
              }
              window.addEventListener('resize', resizeCanvas);
              resizeCanvas();

              // Touch Matrix Input Hooks
              function handleStart(x, y) {
                  if (gameState !== 'PLAYING') return;
                  joystick.startX = x;
                  joystick.startY = y;
                  joystick.currentX = x;
                  joystick.currentY = y;
                  joystick.active = true;
                  joystick.alpha = 1.0;
                  joystick.lastInputTime = Date.now();
              }

              function handleMove(x, y) {
                  if (!joystick.active) return;
                  joystick.currentX = x;
                  joystick.currentY = y;
                  joystick.lastInputTime = Date.now();
                  joystick.alpha = 1.0;
              }

              function handleEnd() {
                  joystick.active = false;
              }

              canvas.addEventListener('mousedown', e => { const rect = canvas.getBoundingClientRect(); handleStart(e.clientX - rect.left, e.clientY - rect.top); });
              canvas.addEventListener('mousemove', e => { const rect = canvas.getBoundingClientRect(); handleMove(e.clientX - rect.left, e.clientY - rect.top); });
              window.addEventListener('mouseup', handleEnd);

              canvas.addEventListener('touchstart', e => { const rect = canvas.getBoundingClientRect(); const t = e.touches[0]; handleStart(t.clientX - rect.left, t.clientY - rect.top); e.preventDefault(); }, {passive: false});
              canvas.addEventListener('touchmove', e => { const rect = canvas.getBoundingClientRect(); const t = e.touches[0]; handleMove(t.clientX - rect.left, t.clientY - rect.top); e.preventDefault(); }, {passive: false});
              window.addEventListener('touchend', handleEnd);

              function startGame() {
                  document.getElementById('mainMenu').classList.add('hidden');
                  document.getElementById('gameOverScreen').classList.add('hidden');
                  gameState = 'PLAYING';
                  player.currentHealth = player.maxHealth;
                  player.x = canvas.width / 2;
                  player.y = canvas.height / 2;
                  score = 0;
                  kills = 0;
                  wave = 1;
                  distanceTraveled = 0;
                  enemies = [];
                  projectiles = [];
                  particles = [];
                  waveActive = false;
                  joystick.lastInputTime = Date.now();
                  joystick.alpha = 1.0;
              }

              function resetToMenu() {
                  document.getElementById('gameOverScreen').classList.add('hidden');
                  document.getElementById('mainMenu').classList.remove('hidden');
                  gameState = 'MENU';
                  resizeCanvas();
              }

              function triggerGameOver() {
                  gameState = 'GAMEOVER';
                  document.getElementById('finalScore').innerText = `WAVES SURVIVED: ${wave - 1} // TOTAL ELIMINATIONS: ${kills}`;
                  document.getElementById('gameOverScreen').classList.remove('hidden');
              }

              function spawnWave() {
                  waveActive = true;
                  let count = 5 + (wave * 3);
                  let hpScale = 50 + (wave * 15);
                  for (let i = 0; i < count; i++) {
                      let angle = Math.random() * Math.PI * 2;
                      let dist = Math.max(canvas.width, canvas.height) * 0.6;
                      enemies.push({
                          x: player.x + Math.cos(angle) * dist,
                          y: player.y + Math.sin(angle) * dist,
                          hp: hpScale,
                          maxHp: hpScale,
                          speed: 1.2 + (Math.random() * 0.4) + (wave * 0.05),
                          type: Math.random() > 0.5 ? 'CUBE' : 'SPHERE',
                          radius: Math.random() > 0.7 ? 16 : 10 // Basic scale variations
                      });
                  }
              }

              // Engine Execution Main Update Loop
              function loop() {
                  ctx.clearRect(0, 0, canvas.width, canvas.height);
                  let now = Date.now();

                  // 1. Draw Geometric Diorama Grid Blueprint
                  ctx.strokeStyle = '#11112a';
                  ctx.lineWidth = 1;
                  let gridSize = 40;
                  for (let x = 0; x < canvas.width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
                  for (let y = 0; y < canvas.height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

                  if (gameState === 'PLAYING' || gameState === 'MENU') {
                      // Update Joystick Decay Matrix
                      if (!joystick.active && now - joystick.lastInputTime > 2000) {
                          joystick.alpha = Math.max(0, joystick.alpha - 0.05);
                      }

                      // Apply Motion Translations Vector Calculations
                      if (joystick.active) {
                          let dx = joystick.currentX - joystick.startX;
                          let dy = joystick.currentY - joystick.startY;
                          let dist = Math.sqrt(dx * dx + dy * dy);
                          
                          if (dist > 0) {
                              let moveX = dx / dist;
                              let moveY = dy / dist;
                              let power = Math.min(dist, joystick.maxRadius) / joystick.maxRadius;
                              
                              let deltaX = moveX * player.speed * power;
                              let deltaY = moveY * player.speed * power;
                              
                              player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x + deltaX));
                              player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y + deltaY));
                              distanceTraveled += Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                          }
                      }

                      // Automated Targeting Core Subsystem
                      if (gameState === 'PLAYING') {
                          if (!waveActive && enemies.length === 0) {
                              setTimeout(spawnWave, 1000);
                              waveActive = true;
                          }

                          if (enemies.length > 0) {
                              let nearest = null;
                              let minDist = Infinity;
                              enemies.forEach(e => {
                                  let d = Math.sqrt((e.x - player.x)**2 + (e.y - player.y)**2);
                                  if (d < minDist) { minDist = d; nearest = e; }
                              });

                              if (nearest) {
                                  player.angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
                                  if (now - lastShotTime > fireRate) {
                                      projectiles.push({
                                          x: player.x, y: player.y,
                                          vx: Math.cos(player.angle) * 9,
                                          vy: Math.sin(player.angle) * 9,
                                          radius: 4
                                      });
                                      lastShotTime = now;
                                  }
                              }
                          }
                      } else {
                          // Idle menu sweep spin loop rotation vector
                          player.angle += 0.01;
                      }

                      // Render Player Primitive Shape Stack (Pill Capsule Chassis + Diamond)
                      ctx.save();
                      ctx.translate(player.x, player.y);
                      ctx.rotate(player.angle);
                      
                      // Draw Capsule Pill Base Base
                      ctx.fillStyle = '#00ffcc';
                      ctx.shadowBlur = 10;
                      ctx.shadowColor = '#00ffcc';
                      ctx.beginPath();
                      ctx.arc(-6, 0, player.radius - 2, Math.PI/2, -Math.PI/2);
                      ctx.
