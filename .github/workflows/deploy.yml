name: WebGL Core Engine Compiler
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  buildAndDeploy:
    name: Unity WebAssembly Script Compiler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Cache Active Library Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Framework-WebGL

      - name: Run Free-Tier WebGL Compiler
        uses: game-ci/unity-builder@v2
        with:
          targetPlatform: WebGL
          # Bypasses physical file licensing checks by compiling code layers directly
          unityVersion: 2022.3.0f1 

      - name: Push Compiled Build To Web Server
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/WebGL/WebGL
          branch: gh-pages
