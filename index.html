<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Figurine: Phase 2 Core</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body { margin: 0; background: #010103; color: #00ffcc; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #gameContainer { width: 100vw; height: 100vh; max-width: 450px; max-height: 850px; position: relative; border: 2px solid #00ffcc; box-shadow: 0 0 25px #00ffcc; background: #030307; transition: border-color 0.5s ease, box-shadow 0.5s ease; }
        canvas { width: 100%; height: 100%; display: block; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(3, 3, 7, 0.95); transition: opacity 0.3s ease; z-index: 10; }
        .hidden { display: none !important; }
        h1 { font-size: 28px; text-shadow: 0 0 10px #00ffcc; margin-bottom: 5px; text-align: center; transition: text-shadow 0.5s ease; }
        .subtitle { color: #ff007f; text-shadow: 0 0 5px #ff007f; margin-bottom: 40px; font-size: 14px; text-align: center; }
        .btn { padding: 16px 32px; background: none; border: 2px solid #00ffcc; color: #00ffcc; font-family: monospace; font-size: 18px; cursor: pointer; text-shadow: 0 0 5px #00ffcc; box-shadow: 0 0 10px #00ffcc; transition: 0.2s; margin: 10px 0; width: 220px; text-align: center; }
        .btn:hover { background: #00ffcc; color: #000; }
        .btn.secondary { border-color: #ff007f; color: #ff007f; text-shadow: 0 0 5px #ff007f; box-shadow: 0 0 10px #ff007f; }
        .btn.secondary:hover { background: #ff007f; color: #000; }
        #wipeOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.1s ease; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="wipeOverlay"></div>
    
    <div id="mainMenu" class="screen">
        <h1 id="menuTitle">FIGURINE IDLE</h1>
        <div class="subtitle" id="menuSub">PHASE 2 // AUDIO & BIOMES ACTIVE</div>
        <button class="btn" id="startBtn" onclick="beginRun()">START RUN</button>
        <button class="btn secondary" onclick="alert('Lab Locked: Requires Phase 5 PlayerPrefs Core Meta-Telemetry Storage.')">UPGRADE LAB</button>
    </div>

    <div id="gameOverScreen" class="screen hidden">
        <h1 style="color: #ff0055; text-shadow: 0 0 15px #ff0055;">RUN CONCLUDED</h1>
        <div id="finalScore" class="subtitle" style="margin-bottom: 30px;">WAVES CLEARED: 0</div>
        <button class="btn" id="retryBtn" onclick="resetToMenu()">RETURN TO BASE</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let gameState = 'MENU';
    let score = 0, kills = 0, wave = 1;
    let waveActive = false, distanceTraveled = 0;
    let isWiping = false;

    // Phase 2 Biome Preset Map Engine
    const BIOMES = [
        { name: 'FOREST DIORAMA', grid: '#004d26', accent: '#00ff66', bg: '#020d06', droneFreq: 65 },
        { name: 'NEON CITY GRID', grid: '#4d3300', accent: '#ffaa00', bg: '#0d0a02', droneFreq: 73 },
        { name: 'CYBER OMNI MATRIX', grid: '#330066', accent: '#cc00ff', bg: '#08020f', droneFreq: 82 },
        { name: 'NOIR ARCHIVE', grid: '#222222', accent: '#ffffff', bg: '#050505', droneFreq: 55 }
    ];
    let currentBiomeIdx = 0;

    const player = { x: 0, y: 0, radius: 14, maxHealth: 100, currentHealth: 100, speed: 3.8, damage: 25, angle: 0 };
    let enemies = [], projectiles = [], enemyProjectiles = [], particles = [];
    let lastShotTime = 0, fireRate = 280;

    const joystick = { startX: 0, startY: 0, currentX: 0, currentY: 0, active: false, alpha: 0, lastInputTime: 0, maxRadius: 50 };
    let keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; initAudio(); });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    // Web Audio Synthesizer Runtime Nodes
    let audioCtx = null, masterGain = null, droneOsc = null;
    function initAudio() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            masterGain.connect(audioCtx.destination);
            
            droneOsc = audioCtx.createOscillator();
            droneOsc.type = 'sawtooth';
            droneOsc.frequency.setValueAtTime(BIOMES[currentBiomeIdx].droneFreq, audioCtx.currentTime);
            
            let lowpass = audioCtx.createBiquadFilter();
            lowpass.type = 'lowpass';
            lowpass.frequency.setValueAtTime(110, audioCtx.currentTime);
            
            droneOsc.connect(lowpass);
            lowpass.connect(masterGain);
            droneOsc.start();
        } catch(e) { console.log("Audio matrix lock state exception caught."); }
    }

    function playSynthTone(freqStart, freqEnd, duration, type='sine', volume=1) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freqStart, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
        gainNode.gain.setValueAtTime(0.15 * volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gainNode);
        gainNode.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function resizeCanvas() {
        const container = canvas.parentElement;
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width > 0 ? rect.width : 450;
        canvas.height = rect.height > 0 ? rect.height : 850;
        if (gameState === 'MENU') { player.x = canvas.width / 2; player.y = canvas.height * 0.65; }
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function handleStart(x, y) {
        initAudio();
        if (gameState !== 'PLAYING' || isWiping) return;
        joystick.startX = x; joystick.startY = y; joystick.currentX = x; joystick.currentY = y;
        joystick.active = true; joystick.alpha = 1.0; joystick.lastInputTime = Date.now();
    }
    function handleMove(x, y) {
        if (!joystick.active) return;
        joystick.currentX = x; joystick.currentY = y; joystick.lastInputTime = Date.now(); joystick.alpha = 1.0;
    }
    function handleEnd() { joystick.active = false; }

    canvas.addEventListener('mousedown', e => { const r = canvas.getBoundingClientRect(); handleStart(e.clientX - r.left, e.clientY - r.top); });
    canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); handleMove(e.clientX - r.left, e.clientY - r.top); });
    window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', e => { const r = canvas.getBoundingClientRect(); const t = e.touches[0]; handleStart(t.clientX - r.left, t.clientY - r.top); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchmove', e => { const r = canvas.getBoundingClientRect(); const t = e.touches[0]; handleMove(t.clientX - r.left, t.clientY - r.top); e.preventDefault(); }, {passive: false});
    window.addEventListener('touchend', handleEnd);

    function beginRun() { initAudio(); resizeCanvas(); setTimeout(startGame, 30); }
    function startGame() {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        gameState = 'PLAYING';
        player.currentHealth = player.maxHealth;
        player.x = canvas.width / 2; player.y = canvas.height / 2;
        score = 0; kills = 0; wave = 1; distanceTraveled = 0; currentBiomeIdx = 0;
        enemies = []; projectiles = []; enemyProjectiles = []; particles = [];
        waveActive = false; isWiping = false; joystick.alpha = 0;
        updateBiomeTheme();
    }

    function updateBiomeTheme() {
        const b = BIOMES[currentBiomeIdx];
        document.getElementById('gameContainer').style.borderColor = b.accent;
        document.getElementById('gameContainer').style.boxShadow = `0 0 25px ${b.accent}`;
        document.getElementById('menuTitle').style.textShadow = `0 0 10px ${b.accent}`;
        document.getElementById('startBtn').style.borderColor = b.accent;
        document.getElementById('startBtn').style.color = b.accent;
        document.getElementById('startBtn').style.boxShadow = `0 0 10px ${b.accent}`;
        if (droneOsc && audioCtx) { droneOsc.frequency.exponentialRampToValueAtTime(b.droneFreq, audioCtx.currentTime + 0.5); }
    }

    function triggerBoardWipe() {
        isWiping = true;
        joystick.active = false;
        document.getElementById('wipeOverlay').style.opacity = '1';
        playSynthTone(150, 600, 0.4, 'triangle', 2);
        
        enemies.forEach(e => {
            for(let k=0; k<6; k++) {
                particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1.0, color: BIOMES[currentBiomeIdx].accent });
            }
        });
        enemies = []; enemyProjectiles = []; projectiles = [];
        
        setTimeout(() => {
            currentBiomeIdx = (currentBiomeIdx + 1) % BIOMES.length;
            updateBiomeTheme();
            document.getElementById('wipeOverlay').style.opacity = '0';
            isWiping = false;
            waveActive = false;
        }, 400);
    }

    function resetToMenu() {
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
        gameState = 'MENU';
        currentBiomeIdx = 0;
        updateBiomeTheme();
        resizeCanvas();
    }

    function triggerGameOver() {
        gameState = 'GAMEOVER';
        playSynthTone(100, 40, 0.8, 'sawtooth', 1.5);
        document.getElementById('finalScore').innerText = `WAVES SURVIVED: ${wave - 1} // ELIMINATIONS: ${kills}`;
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    function spawnWave() {
        let count = 4 + (wave * 2);
        for (let i = 0; i < count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.max(canvas.width, canvas.height) * 0.6;
            let typeRand = Math.random();
            
            let eType = 'CUBE'; 
            if (typeRand > 0.35 && typeRand <= 0.75) eType = 'SPHERE';
            else if (typeRand > 0.75) eType = 'PYRAMID';

            enemies.push({
                x: player.x + Math.cos(angle) * dist, y: player.y + Math.sin(angle) * dist,
                hp: 30 + (wave * 12), maxHp: 30 + (wave * 12),
                speed: 0.8 + (wave * 0.04), type: eType, radius: 12,
                birth: Date.now(), chargeTimer: 1000 + Math.random() * 2000, isCharging: false, lastShot: 0
            });
        }
        waveActive = true;
    }

    function loop() {
        const currentBiome = BIOMES[currentBiomeIdx];
        ctx.fillStyle = currentBiome.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        let now = Date.now();

        // Structural Matrix Grid Rendering
        ctx.strokeStyle = currentBiome.grid;
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

        if (canvas.width === 0 || canvas.height === 0) { requestAnimationFrame(loop); return; }

        if (gameState === 'PLAYING' || gameState === 'MENU') {
            if (!joystick.active && now - joystick.lastInputTime > 2000) { joystick.alpha = Math.max(0, joystick.alpha - 0.02); }

            // Input Vector Translation Tracking
            let moveX = 0, moveY = 0;
            if (joystick.active && !isWiping) {
                let dx = joystick.currentX - joystick.startX;
                let dy = joystick.currentY - joystick.startY;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    moveX = dx / dist; moveY = dy / dist;
                    moveX *= Math.min(dist, joystick.maxRadius) / joystick.maxRadius;
                    moveY *= Math.min(dist, joystick.maxRadius) / joystick.maxRadius;
                }
            } else if (gameState === 'PLAYING' && !isWiping) {
                if (keys['w'] || keys['arrowup']) moveY = -1;
                if (keys['s'] || keys['arrowdown']) moveY = 1;
                if (keys['a'] || keys['arrowleft']) moveX = -1;
                if (keys['d'] || keys['arrowright']) moveX = 1;
                let kDist = Math.sqrt(moveX*moveX + moveY*moveY);
                if (kDist > 0) { moveX /= kDist; moveY /= kDist; }
            }

            if (moveX !== 0 || moveY !== 0) {
                player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x + moveX * player.speed));
                player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y + moveY * player.speed));
                distanceTraveled += player.speed;
            }

            // Combat System Routines
            if (gameState === 'PLAYING' && !isWiping) {
                if (!waveActive && enemies.length === 0) {
                    if (wave > 1 && (wave - 1) % 3 === 0) { triggerBoardWipe(); } 
                    else { spawnWave(); }
                }

                if (enemies.length > 0) {
                    let nearest = null, minDist = Infinity;
                    enemies.forEach(e => {
                        let d = Math.sqrt((e.x - player.x)**2 + (e.y - player.y)**2);
                        if (d < minDist) { minDist = d; nearest = e; }
                    });
                    if (nearest) {
                        player.angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
                        if (now - lastShotTime > fireRate) {
                            projectiles.push({ x: player.x, y: player.y, vx: Math.cos(player.angle) * 8, vy: Math.sin(player.angle) * 8, radius: 4 });
                            playSynthTone(440, 220, 0.12, 'sine', 0.6);
                            lastShotTime = now;
                        }
                    }
                }
            } else { player.angle += 0.008; }

            // Render Player Primitive Structure Stack
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = currentBiome.accent;
            ctx.shadowBlur = 10; ctx.shadowColor = currentBiome.accent;
            ctx.beginPath();
            ctx.arc(-5, 0, player.radius - 2, Math.PI/2, -Math.PI/2);
            ctx.arc(5, 0, player.radius - 2, -Math.PI/2, Math.PI/2);
            ctx.closePath(); ctx.fill();
            ctx.rotate(-player.angle + (now * 0.002));
            ctx.fillStyle = '#ff007f'; ctx.shadowColor = '#ff007f';
            ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(5, 0); ctx.lineTo(0, 6); ctx.lineTo(-5, 0);
            ctx.closePath(); ctx.fill();
            ctx.restore();

            // Player Projectile Processing Array Execution Loop
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i]; p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = '#ffff00'; ctx.shadowBlur = 6; ctx.shadowColor = '#ffff00';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();

                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) { projectiles.splice(i, 1); continue; }

                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    let d = Math.sqrt((p.x - e.x)**2 + (p.y - e.y)**2);
                    if (d < p.radius + e.radius) {
                        e.hp -= player.damage;
                        projectiles.splice(i, 1);
                        playSynthTone(180, 90, 0.08, 'triangle', 0.5);

                        for(let k=0; k<2; k++) {
                            particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 1.0, color: currentBiome.accent });
                        }

                        if (e.hp <= 0) {
                            enemies.splice(j, 1); kills++; score += 100;
                            playSynthTone(200, 50, 0.2, 'sawtooth', 0.8);
                            if (enemies.length === 0) { wave++; waveActive = false; }
                        }
                        break;
                    }
                }
            }

            // Enemy Projectile Processing Trajectory Updates
            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                let ep = enemyProjectiles[i]; ep.x += ep.vx; ep.y += ep.vy;
                ctx.fillStyle = '#ff0055'; ctx.shadowBlur = 6; ctx.shadowColor = '#ff0055';
                ctx.beginPath(); ctx.arc(ep.x, ep.y, ep.radius, 0, Math.PI*2); ctx.fill();

                if (ep.x < 0 || ep.x > canvas.width || ep.y < 0 || ep.y > canvas.height) { enemyProjectiles.splice(i, 1); continue; }

                let pDist = Math.sqrt((ep.x - player.x)**2 + (ep.y - player.y)**2);
                if (pDist < ep.radius + player.radius) {
                    enemyProjectiles.splice(i, 1);
                    player.currentHealth = Math.max(0, player.currentHealth - 8);
                    playSynthTone(120, 60, 0.15, 'sawtooth', 1);
                    if (player.currentHealth <= 0) triggerGameOver();
                }
            }

            // Distinct Phase 2 Divergent AI Pathfinding Behaviors
            enemies.forEach(e => {
                let edx = player.x - e.x; let edy = player.y - e.y;
                let edist = Math.sqrt(edx*edx + edy*edy);

                if (gameState === 'PLAYING' && !isWiping) {
                    if (e.type === 'CUBE') {
                        // Tank Heavy Ram Behavior: Charge trigger burst
                        if (!e.isCharging && now - e.birth > e.chargeTimer) {
                            e.isCharging = true;
                            e.chargeTimer = now; 
                        }
                        if (e.isCharging) {
                            if (now - e.chargeTimer < 600) { 
                                e.x += (edx / edist) * (e.speed * 3.2); e.y += (edy / edist) * (e.speed * 3.2);
                            } else { e.isCharging = false; e.birth = now; e.chargeTimer = 1500 + Math.random()*2000; }
                        } else { e.x += (edx / edist) * (e.speed * 0.6); e.y += (edy / edist) * (e.speed * 0.6); }
                        
                    } else if (e.type === 'SPHERE') {
                        // Swarmer Matrix Path Weaving: Flanking Sine calculation
                        let timeFactor = (now - e.birth) * 0.004;
                        let perX = -edy / edist; let perY = edx / edist;
                        e.x += (edx / edist) * (e.speed * 1.3) + perX * Math.cos(timeFactor) * 1.5;
                        e.y += (edy / edist) * (e.speed * 1.3) + perY * Math.cos(timeFactor) * 1.5;
                        
                    } else if (e.type === 'PYRAMID') {
                        // Sniper Logic: Target maintaining hard thresholds
                        if (edist > 180) { e.x += (edx / edist) * e.speed; e.y += (edy / edist) * e.speed; } 
                        else if (edist < 130) { e.x -= (edx / edist) * (e.speed * 1.2); e.y -= (edy / edist) * (e.speed * 1.2); }
                        
                        if (now - e.lastShot > 1800) {
                            let pAngle = Math.atan2(edy, edx);
                            enemyProjectiles.push({ x: e.x, y: e.y, vx: Math.cos(pAngle) * 4.5, vy: Math.sin(pAngle) * 4.5, radius: 5 });
                            e.lastShot = now;
                        }
                    }
                }

                // Render Segmented Outlines By Target Class Type
                ctx.fillStyle = e.type === 'CUBE' ? '#ff3333' : (e.type === 'SPHERE' ? '#ffaa00' : '#00bfff');
                ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 8;
                ctx.beginPath();
                if (e.type === 'CUBE') {
                    ctx.rect(e.x - e.radius, e.y - e.radius, e.radius*2, e.radius*2);
                } else if (e.type === 'SPHERE') {
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                } else if (e.type === 'PYRAMID') {
                    ctx.moveTo(e.x, e.y - 12); ctx.lineTo(e.x + 11, e.y + 8); ctx.lineTo(e.x - 11, e.y + 8); ctx.closePath();
                }
                ctx.fill();

                // Enemy HP Indicator Overlay Array
                ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(e.x - 12, e.y - e.radius - 7, 24, 3);
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(e.x - 12, e.y - e.radius - 7, 24 * (e.hp / e.maxHp), 3);

                // Hull Hull Collision Damage Logic
                if (gameState === 'PLAYING' && !isWiping && edist < player.radius + e.radius) {
                    player.currentHealth = Math.max(0, player.currentHealth - (e.type === 'CUBE' ? 0.8 : 0.3));
                    if (player.currentHealth <= 0) triggerGameOver();
                }
            });

            // Secondary Particle Processing Burst Loop
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.2, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }

            // Interface Virtual Input Handle Joystick Overlay
            if (joystick.alpha > 0) {
                ctx.save(); ctx.globalAlpha = joystick.alpha; ctx.shadowBlur = 0;
                ctx.strokeStyle = currentBiome.accent; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI*2); ctx.stroke();
                let kx = joystick.currentX - joystick.startX; let ky = joystick.currentY - joystick.startY;
                let kd = Math.sqrt(kx*kx + ky*ky);
                if (kd > joystick.maxRadius) { kx = (kx/kd)*joystick.maxRadius; ky = (ky/kd)*joystick.maxRadius; }
                ctx.fillStyle = '#ff007f';
                ctx.beginPath(); ctx.arc(joystick.startX + kx, joystick.startY + ky, 14, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // Dynamic HUD Text Overlay System Matrix
            if (gameState === 'PLAYING') {
                ctx.shadowBlur = 0; ctx.fillStyle = currentBiome.accent; ctx.font = 'bold 12px monospace';
                ctx.fillText(`BIOME: ${currentBiome.name}`, 15, 25);
                ctx.fillText(`WAVE : ${wave}`, 15, 42);
                ctx.fillText(`KILLS: ${kills}`, 15, 59);
                
                let hbW = 120;
                ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fillRect(canvas.width - hbW - 15, 15, hbW, 12);
                let pct = player.currentHealth / player.maxHealth;
                ctx.fillStyle = pct > 0.4 ? currentBiome.accent : '#ff0055';
                ctx.fillRect(canvas.width - hbW - 15, 15, hbW * pct, 12);
                ctx.strokeStyle = '#ffffff'; ctx.strokeRect(canvas.width - hbW - 15, 15, hbW, 12);
            }
        }
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
</script>
</body>
</html>
